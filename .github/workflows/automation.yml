name: Automation

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promote-build-release-deploy:
    if: github.actor != 'github-actions[bot]' && github.ref_name == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify automation token
        run: |
          if [ -z "${{ secrets.WORKFLOW_PUSH_TOKEN }}" ]; then
            echo "Missing WORKFLOW_PUSH_TOKEN secret. Add a PAT with contents:write to enable auto-merge from dev to main."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate branch
        run: pnpm test

      - name: Resolve version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          CLEAN_VERSION="${VERSION#v}"
          TAG="v${CLEAN_VERSION}"
          echo "raw=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.WORKFLOW_PUSH_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch origin main --tags
          git checkout -B main origin/main
          git merge --no-ff --no-edit "${GITHUB_SHA}"

      - name: Synchronize generated content
        run: pnpm run prepare:content

      - name: Commit generated files
        id: sync
        run: |
          git add README.md docs/SCRIPTS-GUIDE.md src/data/project-stats.json public/project-stats.json
          if git diff --cached --quiet; then
            echo "No generated files changed."
          else
            git commit -m "chore: sync generated content"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build deploy artifact
        run: pnpm run build:prod

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push main
        run: git push origin main

      - name: Create git tag
        if: steps.tag_check.outputs.exists != 'true'
        run: |
          git tag "${{ steps.version.outputs.tag }}" "${{ steps.sync.outputs.sha }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.tag_check.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            const version = '${{ steps.version.outputs.raw }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: '${{ steps.sync.outputs.sha }}',
              name: tag,
              body: `Automated release for version ${version}.`,
              generate_release_notes: true,
            });

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Automation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - main-static

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-generated-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.head.outputs.sha }}
      version: ${{ steps.version.outputs.raw }}
      version_tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.tag_check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Synchronize generated content
        run: pnpm run prepare:content

      - name: Resolve version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="$(pnpm --silent run version:tag)"
          echo "raw=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/SCRIPTS-GUIDE.md src/data/project-stats.json public/project-stats.json
          if git diff --cached --quiet; then
            echo "No generated files changed."
            exit 0
          fi
          git commit -m "chore: sync generated content"
          git push

      - name: Capture source SHA
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  create-release:
    if: github.actor != 'github-actions[bot]' && needs.sync-generated-files.outputs.tag_exists != 'true'
    needs:
      - sync-generated-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synced commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.sync-generated-files.outputs.source_sha }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.sync-generated-files.outputs.version_tag }}"
          git push origin "${{ needs.sync-generated-files.outputs.version_tag }}"

      - name: Publish GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.sync-generated-files.outputs.version_tag }}';
            const version = '${{ needs.sync-generated-files.outputs.version }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: '${{ needs.sync-generated-files.outputs.source_sha }}',
              name: tag,
              body: `Automated release for version ${version}.`,
              generate_release_notes: true,
            });

  deploy-pages:
    if: github.actor != 'github-actions[bot]'
    needs:
      - sync-generated-files
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout synced commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-generated-files.outputs.source_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run predeploy

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
